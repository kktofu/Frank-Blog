{% block content %} {% include "header.html" %}
{% load bootstrap5 %}
<!-- Page Header -->
<header
  class="masthead"
  style="background-image: url('../static/assets/img/edit-bg.jpg')"
>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <!-- TODO: Show a different h1 if editing existing post -->
          {% if is_edit %}
          <h1>Edit Post</h1>
          {% else %}
          <h1>New Post</h1>
          {% endif %}
          <span class="subheading"
            >You're going to make a great blog post!</span
          >
        </div>
      </div>
    </div>
  </div>
</header>

<main class="mb-4">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">
        <!-- TODO:-Add CKEditor and render the form here -->
        <form id="post-form">
          {% csrf_token %}
          {% bootstrap_form form %}
          <input class="btn btn-primary" type="submit" value="OK">
        </form>
      </div>
    </div>
  </div>
</main>

<script>

document.addEventListener("DOMContentLoaded", function() {
  const token = localStorage.getItem("access");
  const user = localStorage.getItem("user");

  {% if not is_edit %}
  if (!token) {
      alert("請先登入才能新增文章！");
      window.location.href = "{% url 'user_login' %}";
      return;
  }
  {% else %}
  if (!token) {
      alert("請先登入才能編輯文章！");
      window.location.href = "{% url 'user_login' %}";
      return;
  }
  if (user != "{{post.author}}") {
      alert("你不是該作者無法修改文章！");
      window.location.href = "{% url 'get_all_posts' %}";
      return;
  }
  {% endif %}
});

document.getElementById("post-form").addEventListener("submit", function(e) {

    e.preventDefault()

    const token = localStorage.getItem("access")

    for (let instance in CKEDITOR.instances) {
        CKEDITOR.instances[instance].updateElement()
    }

    const formData = new FormData(this)

    let url = ""
    let method = ""

    {% if is_edit %}
      url = "/api/post/{{post.id}}/"
      method = "PATCH"
    {% else %}
      url = "/api/post/"
      method = "POST"
    {% endif %}

    const data = {
      title: formData.get("title"),
      subtitle: formData.get("subtitle"),
      body: formData.get("body"),
      img_url: formData.get("url")
     }

    authenticatedFetch(url, {
      method: method,
      headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
          "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
      {% if is_edit %}
        window.location.href = "/app/post/{{post.id}}"
      {% else %}
        window.location.href = "/app/"
      {% endif %}
    })

})
</script>
{% include "footer.html" %} {% endblock %}
